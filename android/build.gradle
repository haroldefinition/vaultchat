// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    // Phase AAA: Firebase google-services plugin classpath. The plugin
    // itself is `apply`-ed in app/build.gradle. Required for FCM.
    classpath('com.google.gms:google-services:4.4.2')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
    // @notifee/react-native ships its own AAR locally in node_modules
    // instead of publishing to a remote Maven repo. Without this entry,
    // gradle can't resolve `app.notifee:core:+` and the debug build fails.
    // We use notifee for the high-priority "incoming_calls" notification
    // channel — see src/services/voipPushService.js + index.js.
    maven { url "$rootDir/../node_modules/@notifee/react-native/android/libs" }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
